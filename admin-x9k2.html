<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | 약속의 자전거</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #F7F4EF; }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-done { background: #D1FAE5; color: #065F46; }
    .badge-rental { background: #DBEAFE; color: #1E40AF; }
    .badge-edu { background: #EDE9FE; color: #5B21B6; }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-lg p-10 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-1">약속의 자전거</h1>
    <p class="text-sm text-center text-gray-400 mb-8">관리자 페이지</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력"
      class="w-full border border-gray-200 rounded px-4 py-3 text-sm focus:outline-none focus:border-green-500 mb-3"
      onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()"
      class="w-full bg-green-700 hover:bg-green-800 text-white font-semibold py-3 rounded transition-colors">
      로그인
    </button>
    <p id="login-error" class="text-red-500 text-xs text-center mt-3 hidden">비밀번호가 틀렸습니다.</p>
  </div>
</div>

<!-- ── 관리자 대시보드 ── -->
<div id="dashboard" class="hidden min-h-screen">

  <!-- 헤더 -->
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <span class="text-green-700 font-bold text-lg">약속의 자전거</span>
      <span class="text-gray-400 text-sm">관리자</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="last-updated" class="text-xs text-gray-400"></span>
      <button onclick="loadData()" class="text-xs bg-green-50 text-green-700 px-3 py-1.5 rounded hover:bg-green-100 transition-colors">
        🔄 새로고침
      </button>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
        로그아웃
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <!-- 통계 카드 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-lg p-5 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">전체 신청</p>
        <p id="stat-total" class="text-3xl font-bold text-gray-800">-</p>
      </div>
      <div class="bg-white rounded-lg p-5 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">오늘 신청</p>
        <p id="stat-today" class="text-3xl font-bold text-green-600">-</p>
      </div>
      <div class="bg-white rounded-lg p-5 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">대기 중</p>
        <p id="stat-pending" class="text-3xl font-bold text-yellow-500">-</p>
      </div>
      <div class="bg-white rounded-lg p-5 shadow-sm">
        <p class="text-xs text-gray-400 mb-1">처리 완료</p>
        <p id="stat-done" class="text-3xl font-bold text-blue-500">-</p>
      </div>
    </div>

    <!-- 필터 -->
    <div class="flex flex-wrap gap-2 mb-5">
      <button onclick="filterData('all')" id="filter-all"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-green-700 text-white">
        전체
      </button>
      <button onclick="filterData('rental')" id="filter-rental"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-50">
        대여 문의
      </button>
      <button onclick="filterData('edu')" id="filter-edu"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-50">
        정비교육 문의
      </button>
      <button onclick="filterData('pending')" id="filter-pending"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-50">
        대기 중
      </button>
    </div>

    <!-- 테이블 -->
    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500">유형</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500">이름</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500">연락처</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 hidden md:table-cell">상세</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 hidden md:table-cell">접수일</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500">상태</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500">관리</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" class="text-center py-10 text-gray-400">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- 상세 모달 -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between px-6 py-4 border-b">
      <h3 class="font-bold text-gray-800">신청 상세</h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div id="modal-content" class="px-6 py-5 space-y-3"></div>
    <div class="px-6 py-4 border-t flex gap-2 justify-end">
      <button onclick="updateStatus('done')"
        class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded transition-colors">
        ✅ 처리 완료
      </button>
      <button onclick="updateStatus('pending')"
        class="bg-yellow-400 hover:bg-yellow-500 text-white text-sm font-semibold px-4 py-2 rounded transition-colors">
        🕐 대기 중으로
      </button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cbqgfplibctiwmqtkksx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNicWdmcGxpYmN0aXdtcXRra3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4OTYyNzAsImV4cCI6MjA5NjQ3MjI3MH0.fRzDPqV-sjhZXrtdQdEBKhaPStFOS7jg_EzvARUUcQU';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PASSWORD = 'Vhrkxms!35';
let allData = [];
let currentFilter = 'all';
let selectedId = null;

/* ── 로그인 ── */
function login() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadData();
  } else {
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('pw-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

/* ── 세션 체크 ── */
window.addEventListener('load', () => {
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadData();
  }
});

/* ── 데이터 로드 ── */
async function loadData() {
  const { data, error } = await supabase
    .from('consultations')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }

  allData = data || [];
  updateStats();
  renderTable(allData);

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `마지막 업데이트: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

/* ── 통계 ── */
function updateStats() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-today').textContent = allData.filter(d => d.created_at?.startsWith(today)).length;
  document.getElementById('stat-pending').textContent = allData.filter(d => d.status === 'pending').length;
  document.getElementById('stat-done').textContent = allData.filter(d => d.status === 'done').length;
}

/* ── 필터 ── */
function filterData(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-50';
  });
  document.getElementById(`filter-${type}`).className =
    'filter-btn px-4 py-2 rounded-full text-sm font-medium bg-green-700 text-white';

  let filtered = allData;
  if (type === 'rental') filtered = allData.filter(d => d.type === 'rental');
  else if (type === 'edu') filtered = allData.filter(d => d.type === 'edu');
  else if (type === 'pending') filtered = allData.filter(d => d.status === 'pending');
  renderTable(filtered);
}

/* ── 테이블 렌더링 ── */
function renderTable(data) {
  const tbody = document.getElementById('table-body');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-gray-400">신청 내역이 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(row => {
    const typeLabel = row.type === 'rental' ? '대여' : row.type === 'edu' ? '정비교육' : row.type || '-';
    const typeBadge = row.type === 'rental' ? 'badge-rental' : 'badge-edu';
    const statusLabel = row.status === 'done' ? '완료' : '대기중';
    const statusBadge = row.status === 'done' ? 'badge-done' : 'badge-pending';
    const date = row.created_at ? row.created_at.slice(0, 10) : '-';

    let detail = '-';
    if (row.type === 'rental') detail = `${row.bike_type || ''} ${row.bike_qty || ''}대 / ${row.rental_date || ''}`;
    if (row.type === 'edu') detail = `${row.edu_course || ''} / ${row.edu_participants || ''}명`;

    return `
      <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
        <td class="px-5 py-4">
          <span class="text-xs font-semibold px-2 py-1 rounded-full ${typeBadge}">${typeLabel}</span>
        </td>
        <td class="px-5 py-4 font-medium text-gray-800">${row.name || '-'}</td>
        <td class="px-5 py-4 text-gray-600">${row.phone || '-'}</td>
        <td class="px-5 py-4 text-gray-500 hidden md:table-cell text-xs">${detail}</td>
        <td class="px-5 py-4 text-gray-400 hidden md:table-cell text-xs">${date}</td>
        <td class="px-5 py-4">
          <span class="text-xs font-semibold px-2 py-1 rounded-full ${statusBadge}">${statusLabel}</span>
        </td>
        <td class="px-5 py-4">
          <button onclick="openModal('${row.id}')"
            class="text-xs text-green-700 hover:text-green-900 font-semibold">상세보기</button>
        </td>
      </tr>`;
  }).join('');
}

/* ── 모달 ── */
function openModal(id) {
  selectedId = id;
  const row = allData.find(d => d.id === id);
  if (!row) return;

  let html = '';
  const fields = [
    ['유형', row.type === 'rental' ? '대여 문의' : '정비교육 문의'],
    ['이름', row.name],
    ['연락처', row.phone],
    ['접수일', row.created_at?.slice(0, 16).replace('T', ' ')],
    ['상태', row.status === 'done' ? '처리 완료' : '대기 중'],
  ];

  if (row.type === 'rental') {
    fields.push(['대여 날짜', row.rental_date], ['자전거 종류', row.bike_type], ['수량', row.bike_qty + '대']);
  } else {
    fields.push(['교육 과정', row.edu_course], ['희망 일정', row.edu_date], ['참가 인원', row.edu_participants + '명'], ['경험 수준', row.edu_level]);
  }
  if (row.message) fields.push(['문의 내용', row.message]);

  html = fields.map(([label, value]) => `
    <div class="flex gap-3">
      <span class="text-xs font-semibold text-gray-400 w-24 flex-shrink-0 mt-0.5">${label}</span>
      <span class="text-sm text-gray-800">${value || '-'}</span>
    </div>`).join('');

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  selectedId = null;
}

/* ── 상태 변경 ── */
async function updateStatus(status) {
  if (!selectedId) return;
  const { error } = await supabase
    .from('consultations')
    .update({ status })
    .eq('id', selectedId);

  if (error) { alert('오류가 발생했습니다.'); return; }

  closeModal();
  await loadData();
  filterData(currentFilter);
}

/* ── 모달 바깥 클릭 닫기 ── */
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
